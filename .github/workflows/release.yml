name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build Linux amd64
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o bin/zimaos-monitor \
            ./cmd/zimaos-monitor

      - name: Package tarball
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          STAGING="zimaos-monitor-${VERSION}-linux-amd64"
          mkdir -p "${STAGING}"
          cp bin/zimaos-monitor "${STAGING}/"
          cp config.example.yaml "${STAGING}/"
          cp systemd/zimaos-monitor.service "${STAGING}/"
          install -m755 scripts/install.sh "${STAGING}/"
          tar -czf "${STAGING}.tar.gz" "${STAGING}"

      - name: Detect pre-release
        id: prerelease
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          if [[ "${VERSION}" == *"-beta"* || "${VERSION}" == *"-rc"* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE }}
          generate_release_notes: true
          files: zimaos-monitor-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
